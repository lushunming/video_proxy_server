name: Cross Compile

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
          - { goos: android, goarch: amd64 }
          
          - { goos: android, goarch: arm }
          - { goos: android, goarch: 386 }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          NAME="myapp-${{ matrix.goos }}-${{ matrix.goarch }}"
          EXT=""
          [ "${{ matrix.goos }}" = "windows" ] && EXT=".exe"
          go build -o "${NAME}${EXT}" -ldflags="-s -w"

      - name: Compress
        run: |
          NAME="myapp-${{ matrix.goos }}-${{ matrix.goarch }}"
          EXT=""
          [ "${{ matrix.goos }}" = "windows" ] && EXT=".exe"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${NAME}.zip" "${NAME}${EXT}"
          else
            tar czf "${NAME}.tar.gz" "${NAME}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: myapp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: myapp-${{ matrix.goos }}-${{ matrix.goarch }}.*

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            myapp-${{ matrix.goos }}-${{ matrix.goarch }}.*
